[pytest]
pythonpath = .
addopts = -ra
testpaths = dreamerrl/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    world_model: tests for RSSM, encoder, decoder, prior/posterior
    imagination: tests for imagine_step and rollout correctness
    actor_critic: tests for actor, critic, and policy/value heads
    trainer: tests for Dreamer training loop and lambda returns
    gpu: tests requiring CUDA
    cpu: tests safe for CPU-only CI
    infra: replay buffer, env wrappers, and utilities
