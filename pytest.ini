[pytest]
pythonpath = .
addopts = -ra
testpaths = dreamerrl/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env =
    DREAMER_DETERMINISTIC_TEST=1

markers =
    rssm: RSSM determinism and CPU/GPU invariants
    smoke: lightweight smoke tests for basic functionality
    functional: functional tests for DreamerV3
    invariants: tests for invariants of the DreamerV3 model
    stress: stress tests for DreamerV3 under extreme conditions
